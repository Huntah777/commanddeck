/* ------------------------------------------------------------------
   STORAGE  ─ Cloudflare D1 sync layer with localStorage as cache.
   - If a sync token is configured: API is source of truth, cache mirrors it.
   - If not: works fully offline via localStorage. Same data shape both ways.
------------------------------------------------------------------- */
const KEY = 'madinah_v1';
const TOKEN_KEY = 'madinah_token';
const ENDPOINT = '/api/state';

const Sync = {
  getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch { return null; } },
  setToken(t) {
    try {
      if (t) localStorage.setItem(TOKEN_KEY, t);
      else localStorage.removeItem(TOKEN_KEY);
    } catch (e) { console.warn('token write failed', e); }
  },
  configured() { return !!this.getToken(); },
  async load() {
    const token = this.getToken();
    if (!token) throw new Error('NO_TOKEN');
    const r = await fetch(ENDPOINT, { headers: { 'Authorization': `Bearer ${token}` } });
    if (r.status === 401) throw new Error('UNAUTHORIZED');
    if (!r.ok) throw new Error(`HTTP_${r.status}`);
    return await r.json();
  },
  async save(state) {
    const token = this.getToken();
    if (!token) throw new Error('NO_TOKEN');
    const r = await fetch(ENDPOINT, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    if (r.status === 401) throw new Error('UNAUTHORIZED');
    if (!r.ok) throw new Error(`HTTP_${r.status}`);
    return await r.json().catch(() => ({}));
  },
};

const Cache = {
  read() {
    try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }
    catch { return null; }
  },
  write(state) {
    try { localStorage.setItem(KEY, JSON.stringify(state)); }
    catch (e) { console.warn('cache write failed', e); }
  },
};

/* ------------------------------------------------------------------
   PILLARS  ─ Abdul-Malik's polymath framework
------------------------------------------------------------------- */
const PILLARS = [
  { id:'deen',      name:'Deen',      color:'#10b981', tw:'deen',      arabic:'الدين'  },
  { id:'tech',      name:'Tech',      color:'#22d3ee', tw:'tech',      arabic:'التقنية' },

/* State-aware helpers — merge admin overrides on top of the defaults */
const resolvePillars = (state) =>
  PILLARS.map(p => ({ ...p, ...(state?.admin?.pillars?.[p.id] || {}) }));
const resolveQuads = (state) =>
  QUADS.map(q => ({ ...q, ...(state?.admin?.quads?.[q.id] || {}) }));
const pillarByIdFromState = (id, state) =>
  resolvePillars(state).find(p => p.id === id) || PILLARS[0];

/* ------------------------------------------------------------------
   QUADRANTS  ─ Eisenhower
------------------------------------------------------------------- */
const QUADS = [

/* ------------------------------------------------------------------
   DATE HELPERS
------------------------------------------------------------------- */
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const fmtKey = (d) => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const parseKey = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const sameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const todayKey = () => fmtKey(new Date());

/* Convert minutes from midnight ↔ "HH:MM" */
const toHM = (mins) => `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
const fromHM = (s) => { const [h,m] = s.split(':').map(Number); return (h||0)*60 + (m||0); };

/* ------------------------------------------------------------------
   SALAH TIMES  ─ Aladhan API (free, no key required)
------------------------------------------------------------------- */
const SALAH_LOC_KEY   = 'madinah_salah_loc';
const SALAH_CACHE_PFX = 'madinah_salah_';
const SALAH_DURATION  = 20; /* minutes of timeline space per prayer */
const SALAH_METHODS = [
  { id:  2, label: 'ISNA — North America' },
  { id:  3, label: 'Muslim World League' },
  { id:  4, label: 'Umm Al-Qura — Makkah' },
  { id:  5, label: 'Egyptian General Authority' },
  { id:  1, label: 'Univ. of Islamic Sciences, Karachi' },
  { id:  9, label: 'Kuwait' },
  { id: 10, label: 'Qatar' },
  { id: 12, label: 'UOIF — France' },
  { id: 13, label: 'Diyanet — Turkey' },
  { id: 15, label: 'Moonsighting Committee Worldwide' },
];
const SALAH_NAMES = {
  Fajr:    { en:'Fajr',    ar:'الفجر'  },
  Dhuhr:   { en:'Dhuhr',   ar:'الظهر'  },
  Asr:     { en:'Asr',     ar:'العصر'  },
  Maghrib: { en:'Maghrib', ar:'المغرب' },
  Isha:    { en:'Isha',    ar:'العشاء' },
};

function useSalahTimes(dKey, method, school) {
  const [salahTimes, setSalahTimes] = useState(null);
  const [location, setLocation]     = useState(() => {
    try { return JSON.parse(localStorage.getItem(SALAH_LOC_KEY)); } catch { return null; }
  });
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);

  const fetchTimes = useCallback(async (lat, lon, dk, m, s) => {
    const cacheKey = `${SALAH_CACHE_PFX}${dk}_${lat.toFixed(3)}_${lon.toFixed(3)}_m${m}_s${s}`;
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) { setSalahTimes(JSON.parse(cached)); return; }
    } catch {}
    setLoading(true); setError(null);
    try {
      const [y, mo, d] = dk.split('-');
      const r = await fetch(
        `https://api.aladhan.com/v1/timings/${d}-${mo}-${y}?latitude=${lat}&longitude=${lon}&method=${m}&school=${s}`
      );
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();
      const t = json.data.timings;
      try { localStorage.setItem(cacheKey, JSON.stringify(t)); } catch {}
      setSalahTimes(t);
    } catch(e) { setError('Salah times unavailable'); }
    setLoading(false);
  }, []);

  const resyncLocation = useCallback(() => {
    if (!navigator.geolocation) { setError('Geolocation not supported'); return; }
    setLoading(true); setError(null);
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        setLocation(loc);
        try { localStorage.setItem(SALAH_LOC_KEY, JSON.stringify(loc)); } catch {}
        fetchTimes(loc.lat, loc.lon, dKey, method, school);
      },
      () => { setError('Location access denied'); setLoading(false); },
      { timeout: 10000 }
    );
  }, [dKey, method, school, fetchTimes]);

  useEffect(() => {
    if (location) fetchTimes(location.lat, location.lon, dKey, method, school);
  }, [location, dKey, method, school, fetchTimes]);

  const salahBlocks = useMemo(() => {
    if (!salahTimes) return [];
    return Object.entries(SALAH_NAMES).map(([key, names]) => {
      const raw = salahTimes[key];
      if (!raw) return null;
      const timeOnly = raw.split(' ')[0];
      const start = fromHM(timeOnly);
      return { id:`salah-${key}`, title:names.en, subtitle:names.ar, pillar:'deen', start, end: start + SALAH_DURATION, isSalah:true };
    }).filter(Boolean);
  }, [salahTimes]);

  return { salahBlocks, location, loading, error, resyncLocation };
}

/* ------------------------------------------------------------------
   BLOCK LAYOUT  ─ column algorithm so overlapping events don't stack
------------------------------------------------------------------- */
function layoutBlocks(blocks) {
  if (!blocks.length) return {};
  const sorted = [...blocks].sort((a,b) => a.start - b.start || a.end - b.end);
  const colEnd = [];
  const colMap = {};
  for (const b of sorted) {
    let col = colEnd.findIndex(e => e <= b.start);
    if (col === -1) { col = colEnd.length; colEnd.push(0); }
    colEnd[col] = b.end;
    colMap[b.id] = col;
  }
  const result = {};
  for (const b of sorted) {
    const peers = sorted.filter(x => x.id !== b.id && x.start < b.end && x.end > b.start);
    const numCols = Math.max(colMap[b.id], ...peers.map(x => colMap[x.id])) + 1;
    result[b.id] = { col: colMap[b.id], numCols };
  }
  return result;
}

/* ------------------------------------------------------------------
   NOTIFICATION SCHEDULER
   Posts a timetable to the SW which uses setTimeout to fire alerts.
   Only runs when the user has granted permission AND enabled notif.
------------------------------------------------------------------- */
function notifEnabled() {
  return typeof Notification !== 'undefined' && Notification.permission === 'granted';
}

/* In PWA standalone mode new Notification() is blocked — always go through the SW */
function showNotificationViaSW(title, body, tag) {
  if (!navigator.serviceWorker?.controller) return;
  navigator.serviceWorker.controller.postMessage({ type: 'SHOW_NOTIFICATION', title, body: body || '', tag: tag || 'commanddeck' });
}

function todayAtMins(mins) {
  const d = new Date();
  d.setHours(Math.floor(mins / 60), mins % 60, 0, 0);
  return d.getTime();
}

function scheduleNotifications(state) {
  if (!notifEnabled() || !state?.ui?.notif) return;
  if (!navigator.serviceWorker?.controller) return;

  const dow = new Date().getDay();
  const now = Date.now();
  const notifications = [];

  const push = (id, title, body, fireAt) => {
    if (fireAt > now) notifications.push({ id, title, body, fireAt });
  };

  /* Calendar blocks */
  (state.blocks || []).forEach(b => {
    if (!b.every.includes(dow) || b.notify === false) return;
    const s = todayAtMins(b.start), e = todayAtMins(b.end);
    push(`b-${b.id}-15`,  'Starting in 15 min', b.title, s - 15 * 60000);
    push(`b-${b.id}-5`,   'Starting in 5 min',  b.title, s -  5 * 60000);
    push(`b-${b.id}-end`, 'Ending in 5 min',    b.title, e -  5 * 60000);
  });

  /* Habit reminders */
  (state.habits || []).forEach(h => {
    if (!h.reminder || !h.days.includes(dow)) return;
    const [hr, mn] = h.reminder.split(':').map(Number);
    const d = new Date(); d.setHours(hr, mn, 0, 0);
    push(`h-${h.id}`, 'Habit reminder', h.name, d.getTime());
  });

  /* Task reminders */
  (state.tasks || []).forEach(t => {
    if (!t.reminder || t.done) return;
    push(`t-${t.id}`, 'Task reminder', t.title, new Date(t.reminder).getTime());
  });

  navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE_NOTIFICATIONS', notifications });
}

/* ------------------------------------------------------------------
   APP
------------------------------------------------------------------- */
function App() {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); /* idle | saving | synced | offline | unauth | local */
  const [setupOpen, setSetupOpen]   = useState(false);

  /* Respect ?view= param from manifest shortcuts */
  const VALID_VIEWS = ['today','habits','tasks','matrix','stats','focus'];
  const urlView = new URLSearchParams(location.search).get('view');
  const startView = VALID_VIEWS.includes(urlView) ? urlView : null;

  /* Merge helper so we never lose new SEED keys when DB shape evolves */
  const hydrate = (data) => {
    const merged = {
      ...SEED(), ...data,
      ui:          { ...SEED().ui,       ...(data?.ui       || {}) },
      pomodoro:    { ...SEED().pomodoro, ...(data?.pomodoro || {}) },
      admin:       { ...SEED().admin,    ...(data?.admin    || {}),
                     pillars: { ...(data?.admin?.pillars || {}) },
                     quads:   { ...(data?.admin?.quads   || {}) },
                   },
      pomodoroLogs: data?.pomodoroLogs || [],
      habits: (data?.habits || SEED().habits).map(h => ({ reminder: null, ...h })),
      tasks:  (data?.tasks  || []).map(t => ({ reminder: null, ...t })),
      blocks: (data?.blocks || SEED().blocks).map(b => ({ notify: true, ...b })),
    };
    if (startView) merged.ui = { ...merged.ui, view: startView };
    return merged;
  };

  /* Initial load */
  useEffect(() => { (async () => {
    const cache = Cache.read();

    if (!Sync.configured()) {
      const base = cache && cache.habits ? hydrate(cache) : SEED();
      const initial = startView ? { ...base, ui: { ...base.ui, view: startView } } : base;
      setState(initial);
      setSyncStatus('local');
      setLoaded(true);
      return;
    }

    try {
      const remote = await Sync.load();
      const remoteEmpty   = !remote?.habits || remote.habits.length === 0;
      const cacheHasData  = cache && cache.habits && cache.habits.length > 0;

      if (remoteEmpty && cacheHasData) {
        /* First-time sync: push local up so we don't lose it */
        await Sync.save(cache);
        setState(hydrate(cache));
      } else if (remoteEmpty) {
        const seed = SEED();
        await Sync.save(seed);
        setState(seed);
      } else {
        setState(hydrate(remote));
      }
      setSyncStatus('synced');
    } catch (e) {
      if (e.message === 'UNAUTHORIZED') {
        Sync.setToken(null);
        setState(cache && cache.habits ? hydrate(cache) : SEED());
        setSyncStatus('unauth');
        setSetupOpen(true);
      } else {
        setState(cache && cache.habits ? hydrate(cache) : SEED());
        setSyncStatus('offline');
      }
    }
    setLoaded(true);
  })(); }, []);

  /* Schedule notifications whenever state is ready or changes */
  useEffect(() => {
    if (!state) return;
    scheduleNotifications(state);
    /* Also reschedule when SW gains control (first install) */
    const onCtrl = () => scheduleNotifications(state);
    navigator.serviceWorker?.addEventListener('controllerchange', onCtrl);
    return () => navigator.serviceWorker?.removeEventListener('controllerchange', onCtrl);
  }, [state]);

  /* Persist on change: localStorage immediately, API debounced */
  const skipFirst = useRef(true);
  const saveTimer = useRef(null);
  useEffect(() => {
    if (!state) return;
    if (skipFirst.current) { skipFirst.current = false; return; }
    Cache.write(state);
    if (!Sync.configured()) return;
    setSyncStatus('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try { await Sync.save(state); setSyncStatus('synced'); }
      catch (e) {
        if (e.message === 'UNAUTHORIZED') { Sync.setToken(null); setSyncStatus('unauth'); setSetupOpen(true); }
        else { setSyncStatus('offline'); }
      }
    }, 800);
  }, [state]);

  if (!loaded || !state) {
    return <div className="min-h-screen flex items-center justify-center text-bone-400 font-display italic">Loading the command deck…</div>;
  }

  const setView = (view) => setState(s => ({ ...s, ui: { ...s.ui, view }}));
  const setDate = (k)    => setState(s => ({ ...s, ui: { ...s.ui, selectedDate: k }}));

  const connectWithToken = async (token) => {
    Sync.setToken(token);
    setSyncStatus('saving');
    try {
      const remote = await Sync.load();
      const remoteEmpty = !remote?.habits || remote.habits.length === 0;
      if (remoteEmpty) { await Sync.save(state); }
      else { setState(hydrate(remote)); }
      setSyncStatus('synced');
      setSetupOpen(false);
    } catch (e) {
      if (e.message === 'UNAUTHORIZED') {
        Sync.setToken(null);
        setSyncStatus('unauth');
        alert('That token was rejected. Check the SYNC_TOKEN environment variable in your Cloudflare Pages settings (case-sensitive, no whitespace).');
      } else {
        setSyncStatus('offline');
        alert('Could not reach the sync endpoint: ' + e.message + '\\nMake sure /api/state is deployed and D1 is bound as "DB".');
      }
    }
  };

  const disconnect = () => {
    if (!confirm('Stop syncing on this device? Local data stays put.')) return;
    Sync.setToken(null);
    setSyncStatus('local');
  };

  const syncNow = async () => {
    if (!Sync.configured()) return;
    clearTimeout(saveTimer.current);
    setSyncStatus('saving');
    try {
      await Sync.save(state);
      const remote = await Sync.load();
      if (remote?.habits) setState(hydrate(remote));
      setSyncStatus('synced');
    } catch (e) {
      if (e.message === 'UNAUTHORIZED') { Sync.setToken(null); setSyncStatus('unauth'); setSetupOpen(true); }
      else setSyncStatus('offline');
    }
  };

  return (
    <div className="min-h-screen">
      <Header state={state} setState={setState} setView={setView} setDate={setDate}
        syncStatus={syncStatus} onConfigureSync={()=>setSetupOpen(true)} onSyncNow={syncNow} />
      <main className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        {state.ui.view === 'today'  && <TodayView state={state} setState={setState} />}
        {state.ui.view === 'habits' && <HabitsView state={state} setState={setState} />}
        {state.ui.view === 'tasks'  && <TasksView state={state} setState={setState} />}
        {state.ui.view === 'matrix' && <MatrixView state={state} setState={setState} />}
        {state.ui.view === 'stats'  && <StatsView state={state} setState={setState}
            syncStatus={syncStatus} onConfigureSync={()=>setSetupOpen(true)} onDisconnect={disconnect}/>}
        {state.ui.view === 'focus'  && <PomodoroView state={state} setState={setState}/>}
      </main>
      <footer className="text-center pb-8 text-xs text-ink-500 font-mono tracking-wide">
        MADINAH · COMMAND DECK · v1.1 · {Sync.configured() ? 'cloudflare d1' : 'local only'}
      </footer>
      {setupOpen && <TokenSetupModal current={Sync.getToken()} onClose={()=>setSetupOpen(false)} onSubmit={connectWithToken}/>}
    </div>
  );
}

/* ------------------------------------------------------------------
   INSTALL BANNER  ─ Android install prompt (Chrome + Firefox)
------------------------------------------------------------------- */
function InstallBanner() {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const isAndroid = /Android/i.test(navigator.userAgent);
  const isFirefox = /Firefox/i.test(navigator.userAgent);

  const [dismissed, setDismissed] = useState(() => localStorage.getItem('cdInstallDismissed') === '1');
  const [prompt, setPrompt] = useState(window._installPrompt || null);

  useEffect(() => {
    const onReady = () => setPrompt(window._installPrompt);
    const onDone  = () => setPrompt(null);
    window.addEventListener('installpromptready', onReady);
    window.addEventListener('appinstalled_done', onDone);
    return () => {
      window.removeEventListener('installpromptready', onReady);
      window.removeEventListener('appinstalled_done', onDone);
    };
  }, []);

  if (isStandalone || dismissed || !isAndroid) return null;

  const dismiss = () => {
    localStorage.setItem('cdInstallDismissed', '1');
    setDismissed(true);
  };

  const install = async () => {
    prompt.prompt();
    const { outcome } = await prompt.userChoice;
    if (outcome === 'accepted') dismiss();
  };

  const menuHint = isFirefox ? 'Tap ⋮ → Install' : 'Tap ⋮ → Add to Home Screen';

  return (
    <div className="border-t border-ink-700 px-4 sm:px-6 lg:px-8 py-2 flex items-center justify-between gap-3 bg-ink-900/60">
      <div className="flex items-center gap-2.5 min-w-0">
        <img src="/command-deck-icon.svg" alt="" className="w-7 h-7 rounded-lg flex-shrink-0"/>
        <div className="min-w-0">
          <div className="text-xs font-semibold text-bone-100 leading-tight">Add to Home Screen</div>
          <div className="text-[10px] text-bone-400 font-mono tracking-wide">
            {prompt ? 'Install Command Deck for offline access' : menuHint}
          </div>
        </div>
      </div>
      <div className="flex items-center gap-2 flex-shrink-0">
        <button onClick={dismiss}
          className="text-[10px] font-mono tracking-wider text-bone-400 hover:text-bone-100 px-2 py-1">
          NOT NOW
        </button>
        {prompt && (
          <button onClick={install}
            className="btn px-3 py-1.5 rounded-lg bg-strategy text-ink-950 text-xs font-bold tracking-wide">
            INSTALL
          </button>
        )}
      </div>
    </div>
  );
}

  const dayKey = state.ui.selectedDate;
  const dayHabits = state.habits.filter(h => h.days.includes(sel.getDay()));

  const pct = dayHabits.length ? Math.round(dayHabits.filter(h => log[h.id]).length / dayHabits.length * 100) : 0;

    let s = 0, cursor = new Date(sel);

/* ------------------------------------------------------------------
   TODAY VIEW  ─ Structured-style timeline + tasks + habits
------------------------------------------------------------------- */
function TodayView({ state, setState }) {
  const sel = parseKey(state.ui.selectedDate);
  const dow = sel.getDay();
  const dKey = state.ui.selectedDate;

  const habitsToday = state.habits.filter(h => h.days.includes(dow));
  const log = state.logs[dKey] || {};
  const toggleHabit = (id) => setState(s => {
    const cur = (s.logs[dKey] || {})[id];
    const next = { ...(s.logs[dKey] || {}) };
    if (cur) delete next[id]; else next[id] = true;
    return { ...s, logs: { ...s.logs, [dKey]: next } };
  });

  /* tasks due today or undated and not done */
  const tasksToday = state.tasks.filter(t => !t.done && (!t.due || t.due === dKey));
  const overdue    = state.tasks.filter(t => !t.done && t.due && t.due < dKey);

  return (
    <div className="grid grid-cols-12 gap-4 lg:gap-6 pt-6 fadeUp">
      {/* Timeline */}
      <section className="col-span-12 lg:col-span-6">
        <SectionHeading kicker="01 / Time" title="The day, blocked" sub="Structured-style timeline · click an hour to drop a block"/>
        <Timeline state={state} setState={setState} dow={dow} dKey={dKey} sel={sel}/>
      </section>

      {/* Tasks */}
      <section className="col-span-12 lg:col-span-3">
        <SectionHeading kicker="02 / Tasks" title="What needs doing" sub="Quick-capture, prioritise, ship"/>
        <QuickAddTask state={state} setState={setState} defaultDate={dKey}/>
        {overdue.length > 0 && (
          <div className="mb-3">
            <div className="text-[10px] font-mono tracking-widest text-combat mb-1.5">OVERDUE · {overdue.length}</div>
            {overdue.map(t => <TaskRow key={t.id} t={t} state={state} setState={setState} compact/>) }
          </div>
        )}
        <div className="text-[10px] font-mono tracking-widest text-bone-400 mb-1.5">TODAY · {tasksToday.length}</div>
        {tasksToday.length === 0
          ? <EmptyHint text="Inbox zero. Add the next move."/>
          : tasksToday.map(t => <TaskRow key={t.id} t={t} state={state} setState={setState}/>)}
      </section>

      {/* Habits */}
      <section className="col-span-12 lg:col-span-3">
        <SectionHeading kicker="03 / Discipline" title="Habits for today" sub={`${habitsToday.filter(h=>log[h.id]).length} / ${habitsToday.length} complete`}/>
        <HabitChecklist habits={habitsToday} log={log} toggle={toggleHabit} state={state}/>
      </section>
    </div>
  );
}

function SectionHeading({ kicker, title, sub }) {
  return (
    <div className="mb-3">
      <div className="text-[10px] font-mono tracking-[0.18em] text-strategy mb-1">{kicker}</div>
      <h2 className="font-display text-2xl sm:text-3xl text-bone-100 leading-tight">{title}</h2>
      {sub && <div className="text-xs text-bone-400 mt-0.5">{sub}</div>}
    </div>
  );
}

function EmptyHint({ text }) {
  return <div className="card-soft p-4 text-sm text-bone-400 italic text-center">{text}</div>;
}

/* ------------------------------------------------------------------
   TIMELINE  (Structured-style vertical day plan)
------------------------------------------------------------------- */
function Timeline({ state, setState, dow, dKey, sel }) {
  const HOUR_PX = 56;
  const startHour = 1, endHour = 24;
  const hours = endHour - startHour;

  const blocks = useMemo(() => state.blocks.filter(b => b.every.includes(dow)), [state.blocks, dow]);
  const [editing, setEditing] = useState(null);
  const [adding,  setAdding]  = useState(null);

  const salahMethod = state.ui.salahMethod ?? 3;
  const salahSchool = state.ui.salahSchool ?? 0;
  const { salahBlocks, location, loading: salahLoading, error: salahError, resyncLocation } = useSalahTimes(dKey, salahMethod, salahSchool);

  const layouts = useMemo(() => layoutBlocks([...blocks, ...salahBlocks]), [blocks, salahBlocks]);

  const [nowMin, setNowMin] = useState(() => { const n = new Date(); return n.getHours()*60 + n.getMinutes(); });
  useEffect(() => {
    const t = setInterval(() => { const n = new Date(); setNowMin(n.getHours()*60 + n.getMinutes()); }, 30000);
    return () => clearInterval(t);
  }, []);

  const isToday = sameDay(sel, new Date());
  const nowTop  = ((nowMin - startHour*60) / 60) * HOUR_PX;
  const showNow = isToday && nowMin >= startHour*60 && nowMin <= endHour*60;

  const blockTop = (b) => ((b.start - startHour*60) / 60) * HOUR_PX;
  const blockHt  = (b) => Math.max(24, ((b.end - b.start) / 60) * HOUR_PX - 4);

  return (
    <div className="card relative overflow-hidden">

      {/* Salah strip */}
      <div className="flex items-center justify-between gap-2 px-3 py-2 border-b border-ink-700 flex-wrap">
        <div className="flex items-center gap-3 flex-wrap min-w-0">
          <span className="text-[10px] font-mono tracking-widest text-deen shrink-0">SALAH</span>
          {salahLoading && <span className="text-[10px] font-mono text-bone-400 animate-pulse">fetching…</span>}
          {salahError   && <span className="text-[10px] font-mono text-combat">{salahError}</span>}
          {!salahLoading && !salahError && salahBlocks.length === 0 && !location && (
            <span className="text-[10px] font-mono text-bone-400">— tap to load prayer times</span>
          )}
          {salahBlocks.map(s => (
            <span key={s.id} className="text-[10px] font-mono text-bone-300 whitespace-nowrap">
              {s.title} <span className="text-deen">{toHM(s.start)}</span>
            </span>
          ))}
        </div>
        <button onClick={resyncLocation}
          className="btn shrink-0 flex items-center gap-1.5 px-2.5 py-1 rounded-md border border-deen/40 text-deen text-[10px] font-mono tracking-wider hover:bg-deen/10">
          <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          </svg>
          {location ? 'RESYNC' : 'GET LOCATION'}
        </button>
      </div>

      <div className="relative scrollbar overflow-y-auto" style={{ maxHeight: '72vh' }}>
        <div className="relative" style={{ height: hours * HOUR_PX + 24 }}>

          {/* Hour lines + click targets */}
          {Array.from({length: hours+1}).map((_,i) => {
            const h = startHour + i;
            return (
              <div key={i} className="absolute left-0 right-0 flex items-start" style={{ top: i*HOUR_PX }}>
                <div className="w-14 pr-2 text-right font-mono text-[10px] text-bone-400 tracking-wider pt-0.5">
                  {String(h%24).padStart(2,'0')}:00
                </div>
                <button onClick={()=>setAdding({ start: h*60, end: h*60+60 })}
                  className="flex-1 h-14 border-t border-ink-700 hover:bg-ink-800/40 transition-colors"
                  aria-label={`Add block at ${h}:00`}/>
              </div>
            );
          })}

          {/* Now indicator */}
          {showNow && <>
            <div className="now-dot" style={{ top: nowTop }}/>
            <div className="now-line" style={{ top: nowTop }}/>
          </>}

          {/* Block container — pointer-events:none so hour-click buttons remain hittable */}
          <div className="absolute" style={{ left: 56, right: 12, top: 0, bottom: 0, pointerEvents: 'none' }}>

            {/* Regular time blocks */}
            {blocks.map(b => {
              const p = pillarById(b.pillar);
              const { col=0, numCols=1 } = layouts[b.id] || {};
              const pct = 100 / numCols;
              return (
                <button key={b.id} onClick={()=>setEditing(b)}
                  className="btn absolute text-left px-2.5 py-1.5 rounded-lg overflow-hidden"
                  style={{
                    top: blockTop(b), height: blockHt(b),
                    left: `${col * pct}%`, width: `calc(${pct}% - 3px)`,
                    background: `linear-gradient(90deg, ${p.color}1a 0%, #131317 60%)`,
                    border: `1px solid ${p.color}55`,
                    borderLeft: `3px solid ${p.color}`,
                    pointerEvents: 'auto',
                  }}>
                  <div className="flex items-center justify-between gap-1">
                    <div className="font-medium text-bone-100 truncate text-xs sm:text-sm">{b.title}</div>
                    <div className="font-mono text-[9px] text-bone-400 whitespace-nowrap shrink-0">{toHM(b.start)}–{toHM(b.end)}</div>
                  </div>
                  <div className="text-[9px] font-mono tracking-wider uppercase mt-0.5" style={{ color: p.color }}>{p.name}</div>
                </button>
              );
            })}

            {/* Salah blocks — non-interactive overlay */}
            {salahBlocks.map(b => {
              const { col=0, numCols=1 } = layouts[b.id] || {};
              const pct = 100 / numCols;
              return (
                <div key={b.id}
                  className="absolute px-2 py-1 rounded-md overflow-hidden"
                  style={{
                    top: blockTop(b), height: blockHt(b),
                    left: `${col * pct}%`, width: `calc(${pct}% - 3px)`,
                    background: 'rgba(16,185,129,0.10)',
                    border: '1px solid rgba(16,185,129,0.45)',
                    borderLeft: '3px solid #10b981',
                  }}>
                  <div className="flex items-center gap-1">
                    <span className="text-deen text-[10px] leading-none shrink-0">☽</span>
                    <span className="font-semibold text-deen text-xs truncate">{b.title}</span>
                    <span className="font-mono text-[9px] text-bone-400 ml-auto whitespace-nowrap shrink-0">{toHM(b.start)}</span>
                  </div>
                  <div className="text-[9px] font-mono text-deen/50" style={{direction:'rtl'}}>{b.subtitle}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {(editing || adding) && (
        <BlockModal
          block={editing}
          adding={adding}
          state={state}
          onClose={()=>{ setEditing(null); setAdding(null); }}
          onSave={(b)=>{
            setState(s => {
              const exists = s.blocks.find(x => x.id === b.id);
              return { ...s, blocks: exists ? s.blocks.map(x=>x.id===b.id?b:x) : [...s.blocks, b] };
            });
            setEditing(null); setAdding(null);
          }}
          onDelete={(id)=>{
            setState(s => ({ ...s, blocks: s.blocks.filter(x => x.id !== id) }));
            setEditing(null);
          }}
          currentDow={dow}
        />
      )}
    </div>
  );
}

/* ------------------------------------------------------------------
   BLOCK MODAL
------------------------------------------------------------------- */
function BlockModal({ block, adding, state, onClose, onSave, onDelete, currentDow }) {
  const isNew = !block;
  const [title, setTitle] = useState(block?.title || '');
  const [pillar, setPillar] = useState(block?.pillar || 'tech');
  const [start, setStart] = useState(toHM(block?.start ?? adding?.start ?? 540));
  const [end,   setEnd]   = useState(toHM(block?.end   ?? adding?.end   ?? 600));
  const [days,  setDays]  = useState(block?.every || [currentDow]);
  const [notify, setNotify] = useState(block?.notify !== false);

  const toggleDay = (d) => setDays(ds => ds.includes(d) ? ds.filter(x=>x!==d) : [...ds, d].sort());

  const save = () => {
    if (!title.trim()) return;
    const startM = fromHM(start), endM = fromHM(end);
    if (endM <= startM) return;
    onSave({
      id: block?.id || `b-${Date.now()}`,
      title: title.trim(), pillar,
      start: startM, end: endM,
      every: days.length ? days : [0,1,2,3,4,5,6],
      notify,
    });
  };

  return (
    <Modal onClose={onClose} title={isNew ? 'New time block' : 'Edit block'}>
      <Field label="Title">
        <input value={title} onChange={e=>setTitle(e.target.value)} autoFocus
          className="w-full bg-ink-800 border border-ink-700 rounded-lg px-3 py-2 text-bone-100"
          placeholder="Deep work · Asbab al-Nuzul · etc."/>
      </Field>
      <Field label="Pillar">
        <div className="grid grid-cols-3 sm:grid-cols-5 gap-2">
          {resolvePillars(state).map(p => (
            <button key={p.id} onClick={()=>setPillar(p.id)}
              className={`btn px-2 py-2 rounded-lg text-xs font-medium ${pillar===p.id ? `glow-${p.tw}` : 'border border-ink-700'}`}
              style={pillar===p.id ? { background: `${p.color}22`, color: p.color } : { color:'#9a9788' }}>
              {p.name}
            </button>
          ))}
        </div>
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Start">
          <input type="time" value={start} onChange={e=>setStart(e.target.value)}
            className="w-full bg-ink-800 border border-ink-700 rounded-lg px-3 py-2 text-bone-100 font-mono"/>
        </Field>
        <Field label="End">
          <input type="time" value={end} onChange={e=>setEnd(e.target.value)}
            className="w-full bg-ink-800 border border-ink-700 rounded-lg px-3 py-2 text-bone-100 font-mono"/>
        </Field>
      </div>
      <Field label="Repeat on">
        <div className="flex gap-1.5 flex-wrap">
          {DAY_SHORT.map((d,i) => (
            <button key={d} onClick={()=>toggleDay(i)}
              className={`btn px-2.5 py-1.5 rounded-md text-xs font-mono tracking-wider ${days.includes(i) ? 'bg-strategy text-ink-950 font-semibold' : 'border border-ink-700 text-bone-400'}`}>
              {d.toUpperCase()}
            </button>
          ))}
        </div>
      </Field>
      <Field label="Notifications">
        <label className="flex items-center gap-2.5 cursor-pointer select-none">
          <input type="checkbox" checked={notify} onChange={e=>setNotify(e.target.checked)}
            className="w-4 h-4 rounded accent-strategy flex-shrink-0"/>
          <span className="text-sm text-bone-300 min-w-0 leading-snug">Alert 15 min before · 5 min before · 5 min before end</span>
        </label>
      </Field>
      <div className="flex justify-between gap-2 pt-2">
        {!isNew && <button onClick={()=>onDelete(block.id)} className="btn px-3 py-2 rounded-lg text-combat border border-combat/30 hover:bg-combat/10 text-sm flex items-center gap-1.5"><I.trash className="w-4 h-4"/>Delete</button>}
        <div className="flex-1"/>
        <button onClick={onClose} className="btn px-4 py-2 rounded-lg border border-ink-700 text-bone-300 text-sm">Cancel</button>
        <button onClick={save} className="btn px-4 py-2 rounded-lg bg-bone-100 text-ink-950 font-semibold text-sm">Save block</button>
      </div>
    </Modal>
  );
}

/* ------------------------------------------------------------------
   QUICK ADD TASK
------------------------------------------------------------------- */
function QuickAddTask({ state, setState, defaultDate, defaultQuadrant='plan', defaultListId }) {
  const [title, setTitle] = useState('');
  const [open, setOpen]   = useState(false);
  const [quadrant, setQuadrant] = useState(defaultQuadrant);
  const [due, setDue] = useState(defaultDate || '');
  const [listId, setListId] = useState(defaultListId || 'l-inbox');

  const submit = () => {
    if (!title.trim()) return;
    setState(s => ({
      ...s,
      tasks: [{
        id:`t-${Date.now()}`, title: title.trim(), notes:'',
        due: due || null, quadrant, listId,
        done:false, created: Date.now(),
      }, ...s.tasks],
    }));
    setTitle(''); setOpen(false);
    setQuadrant(defaultQuadrant); setDue(defaultDate || ''); setListId(defaultListId || 'l-inbox');
  };

  return (
    <div className="card-soft mb-3 overflow-hidden">
      <div className="flex items-center gap-2 p-2.5">
        <I.plus className="w-4 h-4 text-bone-400 ml-1.5"/>
        <input value={title} onChange={e=>setTitle(e.target.value)}
          onKeyDown={e=>{ if (e.key==='Enter') submit(); if (e.key==='Escape') setOpen(false); }}
          onFocus={()=>setOpen(true)}
          placeholder="Capture a task…"
          className="flex-1 bg-transparent text-sm text-bone-100 placeholder:text-bone-400/70"/>
        {title && <button onClick={submit} className="btn px-3 py-1.5 rounded-md bg-strategy text-ink-950 text-xs font-semibold">Add</button>}
      </div>
      {open && (
        <div className="border-t border-ink-700 p-2.5 space-y-2 fadeUp">
          <div className="flex gap-2 items-center text-xs flex-wrap">
            <input type="date" value={due} onChange={e=>setDue(e.target.value)}
              className="min-w-[120px] bg-ink-800 border border-ink-700 rounded px-2 py-1 text-bone-100 font-mono"/>
            <select value={quadrant} onChange={e=>setQuadrant(e.target.value)}
              className="flex-1 min-w-[90px] bg-ink-800 border border-ink-700 rounded px-2 py-1 text-bone-100">
              {resolveQuads(state).map(q => <option key={q.id} value={q.id}>{q.title}</option>)}
            </select>
            <select value={listId} onChange={e=>setListId(e.target.value)}
              className="flex-1 min-w-[90px] bg-ink-800 border border-ink-700 rounded px-2 py-1 text-bone-100">
              {state.lists.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------
   TASK ROW
------------------------------------------------------------------- */
function TaskRow({ t, state, setState, compact, draggable, onDragStart }) {
  const [editing, setEditing] = useState(false);
  const list = state.lists.find(l => l.id === t.listId);
  const q = resolveQuads(state).find(x => x.id === t.quadrant);

  const toggle = () => setState(s => ({
    ...s,
    tasks: s.tasks.map(x => x.id === t.id ? { ...x, done: !x.done, doneAt: !x.done ? Date.now() : null } : x),
  }));
  const remove = () => setState(s => ({ ...s, tasks: s.tasks.filter(x => x.id !== t.id) }));

  return (
    <>
      <div
        draggable={draggable}
        onDragStart={(e)=>onDragStart && onDragStart(e, t)}
        className={`group flex items-start gap-2.5 px-2.5 py-2 rounded-lg hover:bg-ink-800/60 transition-colors ${t.done?'opacity-50':''}`}>
        <button onClick={toggle} className={`tick mt-0.5 ${t.done?'on':''}`} aria-label="toggle">
          {t.done && <I.check className="w-3 h-3"/>}
        </button>
        <div className="flex-1 min-w-0">
          <div className={`text-sm leading-snug ${t.done ? 'line-through text-bone-400' : 'text-bone-100'} cursor-pointer`}
               onClick={()=>setEditing(true)}>
            {t.title}
          </div>
          {!compact && (
            <div className="flex items-center gap-2 mt-1 text-[10px] font-mono tracking-wider text-bone-400 flex-wrap">
              {t.due && <span className={t.due < todayKey() && !t.done ? 'text-combat' : ''}>{t.due}</span>}
              {q && <span className="px-1.5 rounded-sm border border-ink-700">{q.title.toUpperCase()}</span>}
              {list && <span style={{ color: list.color }}>· {list.name}</span>}
            </div>
          )}
        </div>
        <button onClick={remove} className="sm:opacity-0 group-hover:opacity-100 text-bone-400 hover:text-combat transition-opacity shrink-0">
          <I.x className="w-4 h-4"/>
        </button>
      </div>
      {editing && <TaskEditModal t={t} state={state} setState={setState} onClose={()=>setEditing(false)}/>}
    </>
  );
}

/* ------------------------------------------------------------------
   TASK EDIT MODAL

      <Field label="Remind me (optional)">
        <div className="flex items-center gap-2">
          <input type="datetime-local" value={reminder} onChange={e=>setReminder(e.target.value)}

        </div>
      </Field>
      <div className="flex justify-end gap-2 pt-2">
        <button onClick={onClose} className="btn px-4 py-2 rounded-lg border border-ink-700 text-bone-300 text-sm">Cancel</button>
        <button onClick={save} className="btn px-4 py-2 rounded-lg bg-bone-100 text-ink-950 font-semibold text-sm">Save</button>
      </div>
    </Modal>
  );
}

/* ------------------------------------------------------------------
   HABIT CHECKLIST (Today view)
------------------------------------------------------------------- */
function HabitChecklist({ habits, log, toggle, state }) {
  if (!habits.length) return <EmptyHint text="No habits scheduled for this day."/>;
  const grouped = resolvePillars(state).map(p => ({ pillar: p, items: habits.filter(h => h.pillar === p.id) })).filter(g => g.items.length);

  /* compute streak per habit */
  const streakFor = (habitId, days) => {
    let s = 0, cursor = new Date(parseKey(state.ui.selectedDate));
    while (true) {
      const k = fmtKey(cursor);
      if (!days.includes(cursor.getDay())) { cursor = addDays(cursor, -1); if (s>365) break; continue; }
      if ((state.logs[k]||{})[habitId]) { s++; cursor = addDays(cursor, -1); } else break;
      if (s > 365) break;
    }
    return s;
  };

  return (
    <div className="space-y-3">
      {grouped.map(g => (
        <div key={g.pillar.id} className="card-soft p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] font-mono tracking-widest" style={{ color: g.pillar.color }}>{g.pillar.name.toUpperCase()}</div>
            <div className="font-display italic text-bone-400 text-xs" style={{ direction:'rtl' }}>{g.pillar.arabic}</div>
          </div>
          <div className="space-y-1">
            {g.items.map(h => {
              const on = !!log[h.id];
              const s = streakFor(h.id, h.days);
              return (
                <button key={h.id} onClick={()=>toggle(h.id)}

                    {on && <I.check className="w-3 h-3" style={{color:'#0a0a0b'}}/>}
                  </div>

                  {s > 0 && <div className="font-mono text-[10px] text-bone-400 flex items-center gap-0.5"><I.flame className="w-3 h-3"/>{s}</div>}
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function HabitCard({ h, state, setState, onEdit }) {
  const p = pillarByIdFromState(h.pillar, state);
  /* compute 30-day mini heatmap */
  const days = useMemo(() => {
    const out = [];
    const today = new Date();
    for (let i = 29; i >= 0; i--) {
      const d = addDays(today, -i);
      const k = fmtKey(d);
      const scheduled = h.days.includes(d.getDay());
      const done = (state.logs[k]||{})[h.id];
      out.push({ k, scheduled, done });
    }
    return out;
  }, [state.logs, h.id, h.days]);

  /* current streak (only counts scheduled days) */
  const streak = useMemo(() => {
    let s = 0, cursor = new Date();
    while (true) {
      if (!h.days.includes(cursor.getDay())) { cursor = addDays(cursor, -1); if (s>365) break; continue; }
      const k = fmtKey(cursor);
      if ((state.logs[k]||{})[h.id]) { s++; cursor = addDays(cursor, -1); } else break;
      if (s > 365) break;
    }
    return s;
  }, [state.logs, h.id, h.days]);

  /* 30-day completion rate (of scheduled days) */
  const completion = useMemo(() => {
    const sched = days.filter(d=>d.scheduled);
    if (!sched.length) return 0;
    return Math.round(sched.filter(d=>d.done).length / sched.length * 100);
  }, [days]);

  return (
    <div className="rounded-lg border border-ink-700 p-3 bg-ink-900/40">
      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="min-w-0">
          <div className="font-medium text-bone-100 text-sm leading-tight">{h.name}</div>
          <div className="font-mono text-[10px] tracking-wider text-bone-400 mt-1">
            {h.days.length === 7 ? 'DAILY' : h.days.map(d=>DAY_SHORT[d].toUpperCase()).join(' · ')}
          </div>
        </div>
        <button onClick={onEdit} className="text-bone-400 hover:text-bone-100"><I.edit className="w-4 h-4"/></button>
      </div>
      <div className="flex items-center gap-3 mb-2">
        <div className="flex-1 h-1.5 rounded-full bg-ink-700 overflow-hidden">
          <div className="h-full" style={{ width: `${completion}%`, background: p.color }}/>
        </div>
        <div className="font-mono text-[10px] text-bone-400 w-16 text-right">{completion}% · 30D</div>
      </div>
      <div className="flex items-center justify-between">
        <div className="flex gap-[2px]">
          {days.map((d,i) => {
            let cls = 'heat-0';
            if (d.done) cls = 'heat-4';
            else if (d.scheduled) cls = 'heat-1';
            return <div key={i} className={`w-1.5 h-3 sm:w-2 sm:h-3.5 rounded-[2px] ${cls}`} title={`${d.k}${d.done?' · done':''}`} style={d.done ? { background: p.color } : (d.scheduled ? { background: `${p.color}26` } : {})}/>;
          })}
        </div>
        {streak > 0 && (
          <div className="font-mono text-xs flex items-center gap-1" style={{ color: p.color }}>
            <I.flame className="w-3 h-3"/>{streak}
          </div>
        )}
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------
   STATS VIEW
------------------------------------------------------------------- */
const STAT_RANGES = [
  { value: 30,  label: '30d' },
  { value: 60,  label: '60d' },
  { value: 120, label: '120d' },
  { value: 365, label: '1yr' },
  { value: 730, label: '2yr' },
];

function StatsView({ state, setState, syncStatus, onConfigureSync, onDisconnect }) {
  const [statsRange, setStatsRange] = useState(30);

  /* Pillar performance over selected range */
  const pillarStats = useMemo(() => {
    const today = new Date();
    return resolvePillars(state).map(p => {
      const hs = state.habits.filter(h => h.pillar === p.id);
      let scheduled = 0, done = 0;
      for (let i = 0; i < statsRange; i++) {
        const d = addDays(today, -i); const k = fmtKey(d);
        const log = state.logs[k] || {};
        hs.forEach(h => { if (h.days.includes(d.getDay())) { scheduled++; if (log[h.id]) done++; } });
      }
      return { pillar: p, scheduled, done, pct: scheduled ? Math.round(done/scheduled*100) : 0 };
    });
  }, [state.logs, state.habits, statsRange]);

  /* Habit completion chart: daily bars for ≤60 days, weekly buckets above that */
  const habitHistory = useMemo(() => {
    const today = new Date();
    if (statsRange <= 60) {
      const out = [];
      for (let i = statsRange - 1; i >= 0; i--) {
        const d = addDays(today, -i); const k = fmtKey(d);
        const hs = state.habits.filter(h => h.days.includes(d.getDay()));
        const log = state.logs[k] || {};
        out.push({ k, pct: hs.length ? hs.filter(h => log[h.id]).length / hs.length : 0 });
      }
      return out;
    }
    /* Weekly buckets */
    const weeks = Math.ceil(statsRange / 7);
    const out = [];
    for (let w = weeks - 1; w >= 0; w--) {
      let sum = 0, count = 0;
      for (let d = 0; d < 7; d++) {
        const offset = w * 7 + d;
        if (offset >= statsRange) continue;
        const date = addDays(today, -offset);
        const hs = state.habits.filter(h => h.days.includes(date.getDay()));
        const log = state.logs[fmtKey(date)] || {};
        if (hs.length) { sum += hs.filter(h => log[h.id]).length / hs.length; count++; }
      }
      out.push({ k: fmtKey(addDays(today, -(w * 7))), pct: count ? sum / count : 0 });
    }
    return out;
  }, [state.logs, state.habits, statsRange]);

  /* Per-habit completion over selected range */
  const habitStats = useMemo(() => {
    const today = new Date();
    return state.habits.map(h => {
      let scheduled = 0, done = 0;
      for (let i = 0; i < statsRange; i++) {
        const d = addDays(today, -i);
        if (!h.days.includes(d.getDay())) continue;
        scheduled++;
        if ((state.logs[fmtKey(d)] || {})[h.id]) done++;
      }
      return { habit: h, scheduled, done, pct: scheduled ? Math.round(done / scheduled * 100) : 0 };
    }).filter(s => s.scheduled > 0).sort((a, b) => b.pct - a.pct);
  }, [state.logs, state.habits, statsRange]);

  /* tasks done by day for 14 days */
  const tasksByDay = useMemo(() => {
    const out = {}; const today = new Date();
    for (let i = 13; i >= 0; i--) { const k = fmtKey(addDays(today, -i)); out[k] = 0; }
    state.tasks.forEach(t => {
      if (t.done && t.doneAt) {
        const k = fmtKey(new Date(t.doneAt));
        if (k in out) out[k]++;
      }
    });
    return Object.entries(out).map(([k,v]) => ({ k, v }));
  }, [state.tasks]);

  const totalDone = state.tasks.filter(t=>t.done).length;
  const totalOpen = state.tasks.filter(t=>!t.done).length;

  const rangeLabel = STAT_RANGES.find(r => r.value === statsRange)?.label ?? `${statsRange}d`;

  return (
    <div className="pt-6 fadeUp space-y-6">
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <SectionHeading kicker="Stats" title="The numbers don't lie" sub={`${rangeLabel} view across the five pillars`}/>
        <div className="flex items-center gap-1.5 flex-wrap">
          {STAT_RANGES.map(r => (
            <button key={r.value} onClick={() => setStatsRange(r.value)}
              className={`btn px-3 py-1.5 rounded-lg border text-xs font-mono tracking-wider ${statsRange === r.value ? 'bg-bone-100 text-ink-950 font-semibold border-transparent' : 'border-ink-700 text-bone-400 hover:bg-ink-800'}`}>
              {r.label}
            </button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        {pillarStats.map(({ pillar, scheduled, done, pct }) => (
          <div key={pillar.id} className="card p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="font-display text-bone-100 text-lg">{pillar.name}</div>
              <div className="w-2 h-2 rounded-full" style={{ background: pillar.color }}/>
            </div>
            <div className="font-display text-4xl leading-none" style={{ color: pillar.color }}>{pct}<span className="text-xl text-bone-400">%</span></div>
            <div className="mt-3 h-1.5 rounded-full bg-ink-700 overflow-hidden">
              <div className="h-full" style={{ width: `${pct}%`, background: pillar.color }}/>
            </div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="card p-5">
          <div className="flex items-end justify-between mb-4">
            <div>
              <div className="text-[10px] font-mono tracking-widest text-strategy">{rangeLabel.toUpperCase()} · {statsRange > 60 ? 'WEEKLY' : 'DAILY'}</div>
              <div className="font-display text-xl text-bone-100 mt-1">Habit completion</div>
            </div>
            <div className="font-mono text-xs text-bone-400">
              avg {Math.round(habitHistory.reduce((a,b)=>a+b.pct,0)/habitHistory.length*100)}%
            </div>
          </div>
          <div className="flex items-end gap-px h-32">
            {habitHistory.map(d => (
              <div key={d.k} className="flex-1 min-w-0" title={`${d.k}: ${Math.round(d.pct*100)}%`}>
                <div className="w-full rounded-t-sm transition-all"
                  style={{ height: `${Math.max(2, d.pct*100)}%`,
                  background: d.pct >= .8 ? '#10b981' : d.pct >= .5 ? '#f59e0b' : '#3a3a44' }}/>
              </div>
            ))}
          </div>
          <div className="flex justify-between mt-2 font-mono text-[10px] text-bone-400">
            <span>{habitHistory[0]?.k.slice(5)}</span>

function NotificationsCard({ state, setState }) {
  const supported = typeof Notification !== 'undefined';
  const [perm, setPerm] = useState(supported ? Notification.permission : 'denied');
  const enabled = state.ui?.notif && perm === 'granted';

  const toggle = async () => {
    if (enabled) {
      setState(s => ({ ...s, ui: { ...s.ui, notif: false } }));
      return;
    }
    if (perm !== 'granted') {
      const result = await Notification.requestPermission();
      setPerm(result);
      if (result !== 'granted') return;
    }
    setState(s => ({ ...s, ui: { ...s.ui, notif: true } }));
  };

  const statusLine = !supported
    ? 'Not supported in this browser.'
    : perm === 'denied'
    ? 'Blocked — enable in your browser site settings.'
    : enabled
    ? 'Active · calendar alerts, habit & task reminders on.'
    : 'Enable to get calendar alerts, habit & task reminders.';

  return (
    <div className="card p-5">
      <div className="text-[10px] font-mono tracking-widest text-bone-400">NOTIFICATIONS</div>
      <div className="font-display text-xl text-bone-100 mt-1 mb-1">Alerts & reminders</div>
      <div className="text-sm text-bone-400 mb-3">{statusLine}</div>
      {supported && perm !== 'denied' && (
        <button onClick={toggle}
          className={`btn px-3 py-2 rounded-lg text-sm ${enabled ? 'border border-combat/40 text-combat hover:bg-combat/10' : 'border border-ink-700 hover:bg-ink-800 text-bone-300'}`}>
          {enabled ? 'Disable notifications' : 'Enable notifications'}
        </button>
      )}
    </div>
  );
}

function AppZone() {
  const clearCache = async () => {
    if (!confirm('Clear the app cache and reload? The app will re-download on next load.')) return;
    try {
      const regs = await navigator.serviceWorker?.getRegistrations() || [];
      await Promise.all(regs.map(r => r.unregister()));
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    } catch(e) {}
    window.location.reload();
  };
  return (
    <div className="card p-5">
      <div className="text-[10px] font-mono tracking-widest text-bone-400">APP</div>
      <div className="font-display text-xl text-bone-100 mt-1 mb-1">Cache &amp; updates</div>
      <div className="text-sm text-bone-400 mb-3">If the app feels stale after an update, clear the cache and reload.</div>
      <button onClick={clearCache} className="btn px-3 py-2 rounded-lg border border-ink-700 hover:bg-ink-800 text-bone-300 text-sm">Clear cache &amp; reload</button>
    </div>
  );
}

function DangerZone({ state, setState }) {
  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `madinah-${todayKey()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try { const parsed = JSON.parse(reader.result); if (parsed.habits) setState(parsed); }
      catch(err){ alert('Import failed: ' + err.message); }
    };
    reader.readAsText(f);
    e.target.value = '';
  };
  const reset = () => {
    if (confirm('Wipe everything and restore the default seed?')) setState(SEED());
  };

  return (
    <div className="card p-5">
      <div className="text-[10px] font-mono tracking-widest text-bone-400">DATA</div>
      <div className="font-display text-xl text-bone-100 mt-1 mb-3">Backup, restore, reset</div>
      <div className="flex flex-wrap gap-2">
        <button onClick={exportData} className="btn px-3 py-2 rounded-lg border border-ink-700 hover:bg-ink-800 text-bone-300 text-sm">Export JSON</button>

          Import JSON
          <input type="file" accept="application/json" className="hidden" onChange={importData}/>
        </label>
        <button onClick={reset} className="btn px-3 py-2 rounded-lg border border-combat/40 text-combat hover:bg-combat/10 text-sm">Wipe & re-seed</button>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------
   POMODORO VIEW  ─ Focus timer with customisable durations + task logging
------------------------------------------------------------------- */
function PomodoroView({ state, setState }) {
  const cfg = state.pomodoro ?? { workMins: 25, shortMins: 5, longMins: 15, longAfter: 4 };

  const PHASES = [
    { id: 'work',  label: 'Focus',       color: '#ef4444' },
    { id: 'short', label: 'Short break', color: '#10b981' },
    { id: 'long',  label: 'Long break',  color: '#22d3ee' },
  ];

  const [phase,     setPhase]     = useState(0);
  const [secsLeft,  setSecsLeft]  = useState(cfg.workMins * 60);
  const [running,   setRunning]   = useState(false);
  const [doneCount, setDoneCount] = useState(0);
  const [taskId,    setTaskId]    = useState('');
  const [showCfg,   setShowCfg]   = useState(false);

  /* Mutable refs so interval/doComplete always read the latest values */
  const itvRef    = useRef(null);
  const secsRef   = useRef(cfg.workMins * 60);
  const phaseRef  = useRef(0);
  const doneRef   = useRef(0);
  const taskIdRef = useRef('');
  const cfgRef    = useRef(cfg);
  const tasksRef  = useRef(state.tasks);

  phaseRef.current  = phase;
  doneRef.current   = doneCount;
  taskIdRef.current = taskId;
  cfgRef.current    = cfg;
  tasksRef.current  = state.tasks;

  useEffect(() => () => clearInterval(itvRef.current), []);

  /* Reset timer whenever phase changes or durations change */
  useEffect(() => {
    clearInterval(itvRef.current);
    setRunning(false);
    const secs = [cfg.workMins, cfg.shortMins, cfg.longMins][phase] * 60;
    secsRef.current = secs;
    setSecsLeft(secs);
  }, [phase, cfg.workMins, cfg.shortMins, cfg.longMins]);

  const beep = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
      osc.start(); osc.stop(ctx.currentTime + 0.8);
    } catch(e) {}
  };

  const notifRef = useRef(false);
  notifRef.current = state?.ui?.notif;

  /* Called when a phase naturally completes */
  const doComplete = () => {
    const ph    = phaseRef.current;
    const dc    = doneRef.current;
    const tid   = taskIdRef.current;
    const c     = cfgRef.current;
    const tasks = tasksRef.current;
    beep();
    if (notifEnabled() && notifRef.current) {
      const isWork = PHASES[ph].id === 'work';
      const task   = tasks.find(t => t.id === tid);
      showNotificationViaSW(
        isWork ? 'Focus session complete' : `${PHASES[ph].label} over — back to work`,
        task?.title || '',
        'pomodoro'
      );
    }
    if (PHASES[ph].id === 'work') {
      const task = tasks.find(t => t.id === tid);
      setState(s => ({
        ...s,
        pomodoroLogs: [...(s.pomodoroLogs || []), {
          id: `p-${Date.now()}`,
          date: todayKey(),
          taskId:    tid  || null,
          taskTitle: task?.title || null,
          mins: c.workMins,
          completedAt: Date.now(),
        }],
      }));
      const next = dc + 1;
      setDoneCount(next);
      setPhase(next % c.longAfter === 0 ? 2 : 1);
    } else {
      setPhase(0);
    }
  };

  const start = () => {
    if (running) return;
    setRunning(true);
    itvRef.current = setInterval(() => {
      secsRef.current -= 1;
      if (secsRef.current <= 0) {
        secsRef.current = 0;
        clearInterval(itvRef.current);
        setRunning(false);
        setSecsLeft(0);
        doComplete();
      } else {
        setSecsLeft(secsRef.current);
      }
    }, 1000);
  };

  const pause = () => { clearInterval(itvRef.current); setRunning(false); };

  const reset = () => {
    pause();
    const secs = [cfgRef.current.workMins, cfgRef.current.shortMins, cfgRef.current.longMins][phase] * 60;
    secsRef.current = secs;
    setSecsLeft(secs);
  };

  const skip = () => { pause(); doComplete(); };

  const cur      = PHASES[phase];
  const total    = [cfg.workMins, cfg.shortMins, cfg.longMins][phase] * 60;
  const pct      = total > 0 ? (total - secsLeft) / total : 0;
  const fmtT     = (s) => `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  const fmtMins  = (m) => m >= 60 ? `${Math.floor(m / 60)}h ${m % 60}m` : `${m}m`;

  const R    = 88;
  const CX   = 110;
  const circ = 2 * Math.PI * R;

  const openTasks    = state.tasks.filter(t => !t.done);
  const todayLogs    = (state.pomodoroLogs || []).filter(l => l.date === todayKey());
  const totalFocused = todayLogs.reduce((a, l) => a + l.mins, 0);

  const byTask = {};
  todayLogs.forEach(l => {
    const key = l.taskId || '__none__';
    if (!byTask[key]) byTask[key] = { label: l.taskTitle || '(No task)', mins: 0, count: 0 };
    byTask[key].mins  += l.mins;
    byTask[key].count += 1;
  });

  const updateCfg = (next) => setState(s => ({ ...s, pomodoro: next }));
  const cyclePos  = doneCount % cfg.longAfter;

  return (
    <div className="max-w-4xl mx-auto pt-6 fadeUp">
      <SectionHeading kicker="04 / Focus" title="Pomodoro timer" sub="Customisable · task-logged · auditory cues on completion"/>

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-6 mt-2">

        {/* ── Left: Timer ──────────────────────────────────── */}
        <div className="lg:col-span-3 space-y-4">

          {/* Phase pills */}
          <div className="flex items-center gap-2 flex-wrap">
            {PHASES.map((p, i) => (
              <button key={p.id} onClick={() => { if (!running) setPhase(i); }}
                className="btn px-3 sm:px-4 py-1.5 rounded-full text-xs font-mono tracking-wider"
                style={phase === i
                  ? { background: `${p.color}20`, color: p.color, border: `1px solid ${p.color}55` }
                  : { color: '#9a9788', border: '1px solid #1f1f24' }}>
                {p.label.toUpperCase()}
              </button>
            ))}
            <span className="font-mono text-[10px] text-bone-400 ml-auto">SESSION #{doneCount + 1}</span>
          </div>

          {/* Ring + clock */}
          <div className="card flex flex-col items-center py-10 gap-6">
            <div className="relative" style={{ width: 220, height: 220 }}>
              <svg viewBox="0 0 220 220" width="220" height="220" style={{ transform: 'rotate(-90deg)' }}>
                <circle cx={CX} cy={CX} r={R} fill="none" stroke="#1f1f24" strokeWidth="10"/>
                <circle cx={CX} cy={CX} r={R} fill="none"
                  stroke={cur.color} strokeWidth="10" strokeLinecap="round"
                  strokeDasharray={circ}
                  strokeDashoffset={circ * (1 - pct)}
                  style={{ transition: running ? 'stroke-dashoffset 1s linear' : 'none' }}/>
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center gap-1">
                <div className="font-mono text-5xl font-semibold" style={{ color: cur.color, letterSpacing: '-0.02em' }}>
                  {fmtT(secsLeft)}
                </div>
                <div className="text-[10px] font-mono tracking-[0.2em] text-bone-400">{cur.label.toUpperCase()}</div>
              </div>
            </div>

            {/* Controls */}
            <div className="flex items-center gap-4">
              <button onClick={reset} title="Reset"
                className="btn w-11 h-11 rounded-full border border-ink-700 hover:bg-ink-800 flex items-center justify-center text-bone-400">
                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                  <polyline points="1 4 1 10 7 10"/>
                  <path d="M3.51 15a9 9 0 1 0 .49-3.61"/>
                </svg>
              </button>

              {running
                ? <button onClick={pause}
                    className="btn w-16 h-16 rounded-full flex items-center justify-center"
                    style={{ background: cur.color, boxShadow: `0 0 32px ${cur.color}55` }}>
                    <svg className="w-7 h-7" viewBox="0 0 24 24" fill="#0a0a0b">
                      <rect x="6" y="4" width="4" height="16" rx="1"/>
                      <rect x="14" y="4" width="4" height="16" rx="1"/>
                    </svg>
                  </button>
                : <button onClick={start}
                    className="btn w-16 h-16 rounded-full flex items-center justify-center"
                    style={{ background: cur.color, boxShadow: `0 0 24px ${cur.color}44` }}>
                    <svg className="w-7 h-7" viewBox="0 0 24 24" fill="#0a0a0b">
                      <polygon points="6 3 20 12 6 21 6 3"/>
                    </svg>
                  </button>
              }

              <button onClick={skip} title="Skip to next phase"
                className="btn w-11 h-11 rounded-full border border-ink-700 hover:bg-ink-800 flex items-center justify-center text-bone-400">
                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                  <polygon points="5 4 15 12 5 20 5 4"/>
                  <line x1="19" y1="5" x2="19" y2="19"/>
                </svg>
              </button>
            </div>

            {/* Cycle progress dots */}
            <div className="flex gap-2.5">
              {Array.from({ length: cfg.longAfter }).map((_, i) => (
                <div key={i} className="w-2.5 h-2.5 rounded-full transition-all"
                  style={{ background: i < cyclePos ? '#ef4444' : '#2a2a31',
                           boxShadow: i < cyclePos ? '0 0 6px #ef4444aa' : 'none' }}/>
              ))}
            </div>
          </div>

          {/* Task selector */}
          <div className="card-soft p-4">
            <div className="text-[10px] font-mono tracking-widest text-bone-400 mb-2">FOCUS ON</div>
            <select value={taskId} onChange={e => setTaskId(e.target.value)}
              className="w-full bg-ink-800 border border-ink-700 rounded-lg px-3 py-2.5 text-bone-100 text-sm">
              <option value="">— Free focus (no specific task) —</option>
              {openTasks.map(t => (
                <option key={t.id} value={t.id}>{t.title}</option>
              ))}
            </select>
            {taskId && (
              <div className="mt-2 text-[11px] text-bone-400 italic">
                Focus time is logged to this task each time a work session completes.
              </div>
            )}
          </div>
        </div>

        {/* ── Right: Log + Settings ─────────────────────────── */}
        <div className="lg:col-span-2 space-y-4">

          {/* Today's session log */}
          <div className="card p-4">
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="text-[10px] font-mono tracking-widest text-strategy mb-0.5">TODAY</div>
                <div className="font-display text-xl text-bone-100 leading-tight">Session log</div>
              </div>
              <div className="text-right">
                <div className="font-display text-4xl leading-none" style={{ color: '#ef4444' }}>{todayLogs.length}</div>
                <div className="text-[10px] font-mono tracking-wider text-bone-400 mt-0.5">SESSIONS</div>
              </div>
            </div>

            {Object.keys(byTask).length === 0
              ? <EmptyHint text="No sessions yet — start the timer!"/>
              : (
                <div>
                  {Object.entries(byTask).map(([key, { label, mins, count }]) => (
                    <div key={key} className="py-2.5 border-b border-ink-700 last:border-0">
                      <div className="flex items-center justify-between gap-2 mb-1.5">
                        <div className="flex-1 min-w-0 text-sm text-bone-100 truncate">{label}</div>
                        <div className="font-mono text-sm font-semibold whitespace-nowrap" style={{ color: '#ef4444' }}>
                          {fmtMins(mins)}
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 h-1 rounded-full bg-ink-700 overflow-hidden">
                          <div className="h-full rounded-full" style={{
                            width: `${totalFocused ? (mins / totalFocused) * 100 : 0}%`,
                            background: '#ef4444',
                          }}/>
                        </div>
                        <div className="text-[10px] font-mono text-bone-400 whitespace-nowrap">{count}×{cfg.workMins}m</div>
                      </div>
                    </div>
                  ))}
                  <div className="pt-2.5 flex items-center justify-between text-xs font-mono">
                    <span className="text-bone-400 tracking-wider">TOTAL FOCUSED</span>
                    <span className="font-semibold text-bone-100">{fmtMins(totalFocused)}</span>
                  </div>
                </div>
              )
            }
          </div>

          {/* Settings */}
          <div className="card p-4">
            <button className="w-full flex items-center justify-between mb-2" onClick={() => setShowCfg(v => !v)}>
              <div className="text-[10px] font-mono tracking-widest text-bone-400">TIMER SETTINGS</div>
              <span className="text-[10px] font-mono text-bone-400">{showCfg ? '▲' : '▼'}</span>
            </button>
            {!showCfg && (
              <div className="text-sm text-bone-400">
                {cfg.workMins}m focus · {cfg.shortMins}m short · {cfg.longMins}m long · every {cfg.longAfter}
              </div>
            )}
            {showCfg && (
              <PomodoroSettings cfg={cfg} onChange={next => { updateCfg(next); setShowCfg(false); }}/>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function PomodoroSettings({ cfg, onChange }) {
  const [work,  setWork]  = useState(cfg.workMins);
  const [short, setShort] = useState(cfg.shortMins);
  const [long,  setLong]  = useState(cfg.longMins);
  const [after, setAfter] = useState(cfg.longAfter);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, +v || lo));
  const numFld = (label, val, set, lo, hi) => (
    <Field label={label}>
      <input type="number" value={val} min={lo} max={hi}
        onChange={e => set(clamp(e.target.value, lo, hi))}
        className="w-full bg-ink-800 border border-ink-700 rounded-lg px-3 py-2 text-bone-100 font-mono text-sm"/>
    </Field>
  );
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        {numFld('Focus (min)',        work,  setWork,  1, 120)}
        {numFld('Short break (min)', short, setShort, 1,  60)}
        {numFld('Long break (min)',  long,  setLong,  1, 120)}
        {numFld('Long after (×)',    after, setAfter, 1,  10)}
      </div>
      <button onClick={() => onChange({ workMins: work, shortMins: short, longMins: long, longAfter: after })}
        className="btn w-full py-2 rounded-lg bg-strategy text-ink-950 font-semibold text-sm">
        Apply settings
      </button>
    </div>
  );
}

/* ------------------------------------------------------------------
   PRIMITIVES
------------------------------------------------------------------- */
function Modal({ children, onClose, title }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 bg-ink-950/80 backdrop-blur-sm flex items-center justify-center p-4 fadeUp" onClick={onClose}>
      <div className="card max-w-md w-full p-5 space-y-3" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-1">
          <div className="font-display text-2xl text-bone-100">{title}</div>
          <button onClick={onClose} className="text-bone-400 hover:text-bone-100"><I.x className="w-5 h-5"/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div className="text-[10px] font-mono tracking-widest text-bone-400 mb-1.5">{label.toUpperCase()}</div>
      {children}
    </div>
  );
}

/* ------------------------------------------------------------------
   SYNC BADGE  ─ tiny dot showing D1 connection status
------------------------------------------------------------------- */
function SyncBadge({ status, onClick }) {
  const map = {
    idle:    { text:'…',         color:'#9a9788' },
    local:   { text:'LOCAL',     color:'#9a9788' },
    saving:  { text:'SAVING',    color:'#f59e0b' },
    synced:  { text:'D1',        color:'#10b981' },
    offline: { text:'OFFLINE',   color:'#ef4444' },
    unauth:  { text:'UNAUTHED',  color:'#ef4444' },
  };
  const m = map[status] || map.idle;
  const pulse = status === 'saving';
  return (
    <button onClick={onClick} title="Configure D1 sync"
      className="btn flex items-center gap-1.5 px-2.5 py-1.5 rounded-md border border-ink-700 hover:bg-ink-800">
      <span className={`w-1.5 h-1.5 rounded-full ${pulse ? 'animate-pulse' : ''}`} style={{ background: m.color, boxShadow: `0 0 8px ${m.color}88` }}/>
      <span className="font-mono text-[10px] tracking-widest" style={{ color: m.color }}>{m.text}</span>
    </button>
  );
}

/* ------------------------------------------------------------------
   TOKEN SETUP  ─ enter the SYNC_TOKEN env var to connect to D1
------------------------------------------------------------------- */
function TokenSetupModal({ current, onClose, onSubmit }) {
  const [token, setToken] = useState(current || '');
  const submit = () => { if (token.trim()) onSubmit(token.trim()); };
  return (
    <Modal onClose={onClose} title="Connect to Cloudflare D1">
      <div className="text-sm text-bone-300 leading-relaxed">
        Paste the value of the <code className="font-mono text-strategy bg-ink-800 px-1.5 py-0.5 rounded">SYNC_TOKEN</code> environment variable you set in your Cloudflare Pages project. Same token on every device that should sync.
      </div>
      <Field label="Sync token">
        <input autoFocus type="password" value={token} onChange={e=>setToken(e.target.value)}
          onKeyDown={e=>{ if (e.key==='Enter') submit(); }}
          placeholder="•••••••••••••••"
          className="w-full bg-ink-800 border border-ink-700 rounded-lg px-3 py-2 text-bone-100 font-mono"/>
      </Field>
      <div className="text-xs text-bone-400">
        Stored in this browser only. On first connect, if D1 is empty your local data is pushed up. Otherwise D1's data replaces what's here.
      </div>
      <div className="flex justify-end gap-2 pt-2">
        <button onClick={onClose} className="btn px-4 py-2 rounded-lg border border-ink-700 text-bone-300 text-sm">Later</button>
        <button onClick={submit} className="btn px-4 py-2 rounded-lg bg-strategy text-ink-950 font-semibold text-sm">Connect</button>
      </div>
    </Modal>
  );
}

        console.warn('SW registration failed:', err);
      });
    });
